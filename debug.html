<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Test - Vijil Connect</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff00;
        }

        .status {
            margin: 10px 0;
            padding: 10px;
            background: #2a2a2a;
            border-left: 4px solid #00ff00;
        }

        .error {
            border-left-color: #ff0000;
            color: #ff0000;
        }

        .success {
            border-left-color: #00ff00;
            color: #00ff00;
        }

        iframe {
            width: 100%;
            height: 600px;
            border: 2px solid #00ff00;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h1>🔍 Vijil Connect Debug Page</h1>
    <div id="status"></div>

    <h2>Application Frame:</h2>
    <iframe src="http://localhost:8080" id="appFrame"></iframe>

    <script>
        const statusDiv = document.getElementById('status');
        const appFrame = document.getElementById('appFrame');

        function addStatus(message, isError = false) {
            const div = document.createElement('div');
            div.className = `status ${isError ? 'error' : 'success'}`;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            statusDiv.appendChild(div);
        }

        addStatus('Debug page loaded');
        addStatus('Attempting to load application on port 8080...');

        appFrame.onload = function () {
            addStatus('✓ Application iframe loaded successfully');
            try {
                const iframeDoc = appFrame.contentDocument || appFrame.contentWindow.document;
                addStatus(`✓ Iframe document accessible`);
                addStatus(`✓ Iframe body HTML length: ${iframeDoc.body.innerHTML.length} characters`);

                // Check for root element
                const root = iframeDoc.getElementById('root');
                if (root) {
                    addStatus(`✓ Root element found`);
                    addStatus(`✓ Root innerHTML length: ${root.innerHTML.length} characters`);
                    if (root.innerHTML.length === 0) {
                        addStatus('⚠ WARNING: Root element is empty!', true);
                    }
                } else {
                    addStatus('✗ ERROR: Root element not found!', true);
                }
            } catch (e) {
                addStatus(`✗ ERROR accessing iframe: ${e.message}`, true);
            }
        };

        appFrame.onerror = function (e) {
            addStatus(`✗ ERROR loading iframe: ${e}`, true);
        };

        // Monitor console logs from iframe
        setTimeout(() => {
            try {
                const iframeWindow = appFrame.contentWindow;
                if (iframeWindow) {
                    addStatus('Monitoring iframe console...');
                }
            } catch (e) {
                addStatus(`Cannot monitor iframe console: ${e.message}`, true);
            }
        }, 1000);
    </script>
</body>

</html>
